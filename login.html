<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أرامكو للاستثمار - تسجيل الدخول</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root {
            --primary: #4d7cfe;
            --primary-gradient: linear-gradient(135deg, #4d7cfe 0%, #2563eb 100%);
            --surface: #f8f9ff;
            --on-surface: #1a1c1e;
        }
        body {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            background-color: var(--surface);
            color: var(--on-surface);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            width: 90%;
            max-width: 400px;
            background: white;
            padding: 2rem;
            border-radius: 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
        }
        .header-bg {
            background: var(--primary-gradient);
            padding: 2rem 1rem;
            border-radius: 1.5rem;
            text-align: center;
            color: white;
            margin-bottom: 2rem;
        }
        .input-group {
            position: relative;
            margin-bottom: 1.25rem;
        }
        .input-field {
            width: 100%;
            padding: 0.875rem 3rem 0.875rem 1rem;
            border-radius: 1rem;
            border: 1px solid #e2e8f0;
            background: #fcfdfe;
            font-size: 0.95rem;
        }
        .input-icon {
            position: absolute;
            top: 50%;
            right: 1rem;
            transform: translateY(-50%);
            color: #94a3b8;
        }
        .btn-primary {
            width: 100%;
            padding: 1rem;
            border-radius: 1rem;
            background-color: var(--primary);
            color: white;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(77, 124, 254, 0.2);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <header class="header-bg">
            <h1 class="text-xl font-bold mb-1">Aramco Invest</h1>
            <p class="text-xs opacity-80">أهلاً بك مرة أخرى في منصتك</p>
        </header>

        <form onsubmit="event.preventDefault(); window.location.href='index.html';">
            <div class="input-group">
                <label class="block text-xs font-bold text-slate-700 mb-2 mr-1">البريد الإلكتروني أو الهاتف</label>
                <div class="relative">
                    <input type="text" class="input-field" placeholder="user@email.com" required>
                    <span class="material-symbols-outlined input-icon">person</span>
                </div>
            </div>

            <div class="input-group">
                <label class="block text-xs font-bold text-slate-700 mb-2 mr-1">كلمة المرور</label>
                <div class="relative">
                    <input type="password" class="input-field" placeholder="أدخل كلمة المرور" required>
                    <span class="material-symbols-outlined input-icon">lock</span>
                </div>
            </div>

            <button type="submit" class="btn-primary mt-6">
                <span>تسجيل الدخول</span>
                <span class="material-symbols-outlined">login</span>
            </button>
        </form>

        <div class="mt-8 text-center">
            <p class="text-sm text-slate-400 text-xs">
                ليس لديك حساب؟ <a href="signup.html" class="text-blue-600 font-bold">إنشاء حساب جديد</a>
            </p>
        </div>
    </div>

</body>
</html>
