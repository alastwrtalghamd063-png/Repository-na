<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أرامكو للاستثمار - مستويات VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root {
            --primary: #4d7cfe;
            --surface: #f8f9ff;
            --on-surface: #1a1c1e;
        }
        body {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            background-color: var(--surface);
            margin: 0;
            padding-bottom: 90px;
        }
        .header-bg {
            background: linear-gradient(135deg, #4d7cfe 0%, #2563eb 100%);
            border-radius: 0 0 40px 40px;
        }
        .vip-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(226, 232, 240, 0.5);
            margin-bottom: 1rem;
            padding: 1.5rem;
        }
        .vip-badge {
            background: rgba(77, 124, 254, 0.1);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 700;
        }
        .btn-open {
            width: 100%;
            background-color: var(--primary);
            color: white;
            padding: 0.75rem;
            border-radius: 1rem;
            font-weight: 700;
            border: none;
            box-shadow: 0 4px 12px rgba(77, 124, 254, 0.2);
        }
    </style>
</head>
<body>

    <header class="header-bg text-white pt-12 pb-10 px-6 text-center">
        <h1 class="text-2xl font-bold mb-2">مركز كبار الشخصيات VIP</h1>
        <p class="text-white/80 text-sm">استثمر لزيادة دخلك اليومي</p>
    </header>

    <main class="px-5 mt-6">
        <!-- VIP 1 -->
        <div class="vip-card">
            <div class="flex justify-between items-start mb-4">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center">
                        <span class="material-symbols-outlined text-blue-600">military_tech</span>
                    </div>
                    <div>
                        <h3 class="font-bold text-slate-800">VIP 1</h3>
                        <p class="text-[10px] text-slate-400">استثمار أساسي</p>
                    </div>
                </div>
                <span class="vip-badge">5.00 USDT</span>
            </div>
            <div class="flex justify-between items-center bg-slate-50 p-4 rounded-xl mb-4 text-center">
                <div>
                    <p class="text-[10px] text-slate-400">الربح اليومي</p>
                    <p class="font-bold text-green-600">3.00 USDT</p>
                </div>
                <div class="w-[1px] h-8 bg-slate-200"></div>
                <div>
                    <p class="text-[10px] text-slate-400">الربح الإجمالي</p>
                    <p class="font-bold text-slate-800">90.00 USDT</p>
                </div>
            </div>
            <button class="btn-open" onclick="alert('جاري التحويل لصفحة الإيداع...')">فتح الآن</button>
        </div>

        <!-- VIP 2 -->
        <div class="vip-card">
            <div class="flex justify-between items-start mb-4">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-orange-50 rounded-xl flex items-center justify-center">
                        <span class="material-symbols-outlined text-orange-600">military_tech</span>
                    </div>
                    <div>
                        <h3 class="font-bold text-slate-800">VIP 2</h3>
                    </div>
                </div>
                <span class="vip-badge">35.00 USDT</span>
            </div>
            <button class="btn-open">فتح الآن</button>
        </div>
        
        <p class="text-center text-slate-400 text-[10px] py-4">تصل المستويات حتى VIP 10 بدخل يومي ضخم.</p>
    </main>

    <nav class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-100 flex justify-around items-center py-3 z-50">
        <a href="index.html" class="flex flex-col items-center gap-1 text-slate-400">
            <span class="material-symbols-outlined">home</span>
            <span class="text-[10px]">بيت</span>
        </a>
        <a href="tasks.html" class="flex flex-col items-center gap-1 text-slate-400">
            <span class="material-symbols-outlined">assignment</span>
            <span class="text-[10px]">مهمة</span>
        </a>
        <a href="team.html" class="flex flex-col items-center gap-1 text-slate-400">
            <span class="material-symbols-outlined">group</span>
            <span class="text-[10px]">فريق</span>
        </a>
        <a href="vip.html" class="flex flex-col items-center gap-1 text-blue-600 font-bold">
            <span class="material-symbols-outlined">military_tech</span>
            <span class="text-[10px]">VIP</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center gap-1 text-slate-400">
            <span class="material-symbols-outlined">person</span>
            <span class="text-[10px]">أنا</span>
        </a>
    </nav>
</body>
</html>
