<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أرامكو للاستثمار - إنشاء حساب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root {
            --primary: #4d7cfe;
            --primary-gradient: linear-gradient(135deg, #4d7cfe 0%, #2563eb 100%);
            --surface: #f8f9ff;
            --on-surface: #1a1c1e;
        }
        body {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            background-color: var(--surface);
            color: var(--on-surface);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .header-bg {
            background: var(--primary-gradient);
            border-radius: 0 0 40px 40px;
        }
        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(226, 232, 240, 0.5);
        }
        .input-group {
            position: relative;
            margin-bottom: 1.25rem;
        }
        .input-field {
            width: 100%;
            padding: 0.875rem 3rem 0.875rem 1rem;
            border-radius: 1rem;
            border: 1px solid #e2e8f0;
            background: #fcfdfe;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }
        .input-field:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(77, 124, 254, 0.1);
            outline: none;
        }
        .input-icon {
            position: absolute;
            top: 50%;
            right: 1rem;
            transform: translateY(-50%);
            color: #94a3b8;
        }
        .btn-primary {
            width: 100%;
            padding: 1rem;
            border-radius: 1rem;
            background-color: var(--primary);
            color: white;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(77, 124, 254, 0.2);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header class="header-bg text-white pt-12 pb-20 px-6 text-center">
        <h1 class="text-2xl font-bold mb-2">Aramco Invest</h1>
        <h2 class="text-3xl font-black">إنشاء حساب جديد</h2>
    </header>

    <main class="px-5 -mt-10 relative z-20 mb-10">
        <div class="card p-6">
            <form onsubmit="event.preventDefault(); alert('تم إنشاء الحساب بنجاح!'); window.location.href='index.html';">
                <div class="input-group">
                    <label class="block text-sm font-bold text-slate-700 mb-2 mr-1">البريد الإلكتروني أو الهاتف</label>
                    <div class="relative">
                        <input type="text" class="input-field" placeholder="user@email.com" required>
                        <span class="material-symbols-outlined input-icon">person</span>
                    </div>
                </div>

                <div class="input-group">
                    <label class="block text-sm font-bold text-slate-700 mb-2 mr-1">كلمة المرور</label>
                    <div class="relative">
                        <input type="password" class="input-field" placeholder="أدخل كلمة المرور" required>
                        <span class="material-symbols-outlined input-icon">lock</span>
                    </div>
                </div>

                <div class="input-group">
                    <label class="block text-sm font-bold text-slate-700 mb-2 mr-1">شفرة الدعوة</label>
                    <div class="relative">
                        <input type="text" id="inviteCodeField" class="input-field bg-slate-50 font-bold text-blue-600" placeholder="شفرة الدعوة" required>
                        <span class="material-symbols-outlined input-icon">group_add</span>
                    </div>
                </div>

                <button type="submit" class="btn-primary mt-6">
                    <span>اشترك الآن</span>
                    <span class="material-symbols-outlined">arrow_back</span>
                </button>
            </form>

            <div class="mt-8 text-center border-t border-slate-100 pt-6">
                <p class="text-sm text-slate-400">
                    لديك حساب بالفعل؟ <a href="login.html" class="text-blue-600 font-bold">تسجيل الدخول</a>
                </p>
            </div>
        </div>
    </main>

    <script>
        function getInviteCode() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('invite_code');
            document.getElementById('inviteCodeField').value = code || 'r9s3fd';
        }
        window.onload = getInviteCode;
    </script>
</body>
</html>
